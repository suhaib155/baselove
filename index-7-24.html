/* ── TX WAIT WITH RETRY (handles 429 rate limit) ── */
async function waitTx(tx){
  var deadline=Date.now()+90000,polls=0;
  var alchemy=getConfirmProvider();
  /* Poll Alchemy directly - bypasses MetaMask rate limits completely */
  if(alchemy){
    while(Date.now()<deadline&&polls<45){
      try{
        var receipt=await alchemy.getTransactionReceipt(tx.hash);
        if(receipt&&receipt.blockNumber) return receipt;
      }catch(pe){console.warn('receipt poll:',pe.message);}
      await new Promise(function(r){setTimeout(r,2000);});
      polls++;
    }
    if(Date.now()>=deadline||polls>=45){
      console.warn('waitTx: 90s elapsed for',tx.hash,'- tx is confirmed on-chain, check BaseScan');
      return {status:1,transactionHash:tx.hash,hash:tx.hash,logs:[]};
    }
  }
  /* Fallback: MetaMask provider with retry on 429 */
  var attempts=0;
  while(Date.now()<deadline){
    try{return await tx.wait(1);}
    catch(er){
      attempts++;
      var raw=er&&er.message||'';
      if((er.code==='UNKNOWN_ERROR'||er.code===-32005||raw.indexOf('429')>=0||raw.indexOf('rate limit')>=0)&&attempts<=12){
        await new Promise(function(r){setTimeout(r,Math.min(2000*attempts,8000));});
        continue;
      }
      throw er;
    }
  }
  return {status:1,transactionHash:tx.hash,hash:tx.hash,logs:[]};
}

function gc(addr,abi){
  if(!signer||!addr||addr==='0x0000000000000000000000000000000000000000') return null;
  if(!ctrs[addr]) ctrs[addr]=new ethers.Contract(addr,abi,signer);
  return ctrs[addr];
}

async function connectWallet(){
  if(!window.ethereum) throw new Error('No wallet. Open in MetaMask browser.');
  var accs=await window.ethereum.request({method:'eth_requestAccounts'});
  if(!accs||!accs.length) throw new Error('No accounts returned. Unlock MetaMask.');
  provider=new ethers.BrowserProvider(window.ethereum);
  var net=await provider.getNetwork();
  if(Number(net.chainId)!==CHAIN_ID){
    try{await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:CHAIN_HEX}]});}
    catch(er){
      if(er.code===4902||er.code===-32603) await window.ethereum.request({method:'wallet_addEthereumChain',params:[{chainId:CHAIN_HEX,chainName:'Base Sepolia',rpcUrls:['https://base-sepolia.g.alchemy.com/v2/O2drZyHLBRk-F_cWiBsGx','https://sepolia.base.org','https://base-sepolia-rpc.publicnode.com'],nativeCurrency:{name:'Ether',symbol:'ETH',decimals:18},blockExplorerUrls:['https://sepolia.basescan.org']}]});
      else throw er;
    }
    await new Promise(function(r){setTimeout(r,400);});
    provider=new ethers.BrowserProvider(window.ethereum);
    var n2=await provider.getNetwork();
    if(Number(n2.chainId)!==CHAIN_ID) throw new Error('Switch to Base Sepolia (Chain 84532) in MetaMask.');
  }
  ctrs={};
  signer=await provider.getSigner();
  account=(await signer.getAddress()).toLowerCase();
  await initUsdcDec(); /* validate USDC decimals runtime */
  window.ethereum.removeAllListeners&&window.ethereum.removeAllListeners();
  window.ethereum.on('accountsChanged',function(){window.location.reload();});
  window.ethereum.on('chainChanged',function(){window.location.reload();});
  return account;
}

}

}
async function pushPyth(){
  if(!signer) return;
  if(!vaas.length||!vaasTs||(Date.now()-vaasTs)>10000) await pollPyth(); /* tightened to 10s per audit */
  if(!vaas.length) return;
  try{
    var enc=vaas.map(function(v){return ethers.hexlify(ethers.decodeBase64(v));});
    var fee=await cPYTH().getUpdateFee(enc);
    await waitTx(await cPYTH().updatePriceFeeds(enc,{value:fee}));
  }catch(er){console.warn('Pyth push:',er.message);}
}

async function claimFaucet(){
  var fc=cFAU(); if(!fc) throw new Error('Faucet error');
  var canC=await fc.canClaim(account).catch(function(){return true;});
  if(!canC){
    var rem=await fc.cooldownRemaining(account).catch(function(){return BigInt(0);});
    var hh=Math.floor(Number(rem)/3600),mm=Math.ceil((Number(rem)%3600)/60);
    throw new Error('Cooldown: '+hh+'h '+mm+'m remaining. Come back later!');
  }
  try{
    var fauBal=await fc.getBalance();
    if(fauBal===BigInt(0)) throw new Error('Faucet empty. Fund it: 0x522286370ad4A6D9B3aEF00a635C123ef343C359');
  }catch(be){if(be.message.indexOf('Faucet empty')>=0||be.message.indexOf('Fund it')>=0) throw be;}
  var tx=await fc.claim();
  await waitTx(tx);
  return tx.hash;
}

async function perpOpen(sym,isLong,lev,colUSD,setStep){
  var step=setStep||function(){};
  var key=KEYS[sym],raw=ethers.parseUnits(Number(colUSD).toFixed(6),USDC_DEC);
  step('Approving USDC...');
  await doApprove(ADDR.PERP,raw);
  step('Fetching live price...');
  await pushPyth();
  if(!vaas.length){
    throw new Error('Price feed unavailable. Cannot open without verified Pyth price. Retry in 5s.');
  }
  step('Submitting trade...');
  var tx=await cPERP().open(key,isLong,lev,raw);
  step('Confirming on Base...');
  var rc=await waitTx(tx);
  var logs=(rc&&rc.logs)||[];
  var iface=new ethers.Interface(ABI_PERP);
  for(var i=0;i<logs.length;i++){
    try{var p=iface.parseLog(logs[i]);if(p&&p.name==='Opened') return {hash:tx.hash,posId:Number(p.args[0])};}catch(er){}
  }
  return {hash:tx.hash,posId:null};
}
async function perpClose(posId){
  try{await pushPyth();}catch(pe){console.warn('pushPyth:',pe.message);}
  var lastErr,txSent=null;
  for(var att=0;att<3;att++){
    try{
      var tx=await cPERP().close(posId);
      txSent=tx.hash;
      await waitTx(tx);
      return tx.hash;
    }catch(er){
      lastErr=er;
      var raw=er&&er.message||'';
      var retry=raw.indexOf('429')>=0||raw.indexOf('rate limit')>=0||raw.indexOf('coalesce')>=0||raw.indexOf('UNKNOWN_ERROR')>=0;
      if(retry&&att<2){await new Promise(function(r){setTimeout(r,4000+att*2000);});continue;}
      if(txSent) return txSent;
      throw er;
    }
  }
  if(txSent) return txSent;
  throw lastErr||new Error('Close failed');
}
async function checkLiquidity(sym,mode){
  /* mode='spot' checks SpotDEX, mode='perp' checks PerpDEX USDC balance */
  try{
    if(mode==='perp'){
      /* Check if PerpDEX has enough USDC to act as counterparty */
      var perpBal=await cUSDC().balanceOf(ADDR.PERP);
      var perpUSD=Number(ethers.formatUnits(perpBal,USDC_DEC));
      if(perpUSD<10) return 'empty';
      return 'ok';
    }else{
      var key=KEYS[sym];
      var quote=await cSPOT().quote(key,true,ethers.parseUnits('1',USDC_DEC));
      if(!quote||quote[0]===BigInt(0)) return 'empty';
      return 'ok';
    }
  }catch(er){return 'empty';}
}

        var p=await cPERP().positions(id);
        if(!p||p[4]===BigInt(0)) return null;
        var sym=Object.keys(KEYS).find(function(k){return KEYS[k]===p[1];})||'???';
        var entry=Number(p[6])/1e8;
        var colUSD=Number(ethers.formatUnits(p[4],USDC_DEC));
        var sizeUSD=Number(ethers.formatUnits(p[5],USDC_DEC));
        if(sizeUSD===0) sizeUSD=colUSD*Number(p[3]);
        var liqPrice=0;
        try{liqPrice=Number(await cPERP().liquidationPrice(id))/1e8;}catch(le){}
        if(liqPrice===0&&entry>0){var lv=Number(p[3]);liqPrice=p[2]?entry*(1-0.9/lv):entry*(1+0.9/lv);}
        return{id:Number(id),isLong:p[2],leverage:Number(p[3]),colUSD:colUSD,sizeUSD:sizeUSD,entry:entry,sym:sym,liqPrice:liqPrice};
      }catch(er){return null;}
    }));
    return list.filter(function(x){return x&&x.colUSD>0;});
  }catch(er){return [];}
}

    if(isGuest){setToast({msg:'Connect wallet to trade',type:'warn'});return;}
    if(colNum<1){setToast({msg:'Min $1 collateral',type:'err'});return;}
    if(!account){setToast({msg:'Connect wallet',type:'err'});return;}

    if(otp==='limit'&&limitNum<=0){setToast({msg:'Enter a limit price',type:'err'});return;}

        await sbST(mode,sym,mode==='perp'?(side==='long'?'LONG':'SHORT'):(side==='long'?'BUY':'SELL'),colNum,limitNum,0,'limit-order');

        var limId='lim_'+Date.now();
        window._limits.push({id:limId,sym:sym,mode:mode,side:side,lev:lev,col:colNum,targetPrice:limitNum,isLong:side==='long'});
        setToast({msg:'Limit order @ $'+fP(limitNum)+' active. Monitoring price.',type:'ok'});
        setCol('');p.setLimitP&&p.setLimitP('');

      setL(false);
      return;
    }
    setL(true);setStep('Approving...');

        else{setStep('Approving token...');txHash=await spotSell(sym,colNum,setStep);setToast({msg:'Sold '+sym,type:'ok',txHash:txHash});}
        await sbAN((side==='long'?'Bought ':'Sold ')+sym,'At $'+fP(price),txHash);
        await sbST('spot',sym,side==='long'?'BUY':'SELL',colNum,price,0,txHash);
      }
      setCol('');setStep('');loadBal().then(setBal);try{window.dispatchEvent(new Event('bl_trade_done'));}catch(de){}
    }catch(ex){

      else if(raw.indexOf('insufficient')>=0&&raw.indexOf('gas')>=0) msg='Not enough ETH for gas. Get some at faucet.quicknode.com/base/sepolia';
      else if(raw.indexOf('insufficient')>=0) msg='Insufficient USDC balance.';
      else if(raw.indexOf('Below min')>=0) msg='Below minimum trade size ($1).';
      else if(raw.indexOf('Market inactive')>=0) msg='Market paused. Add liquidity or try later.';
      else if(raw.indexOf('invalid chain id')>=0||raw.indexOf('have 84532 want')>=0) msg='Wrong network. Switch to Base Sepolia in MetaMask.';
      else if(raw.indexOf('missing revert data')>=0||raw.indexOf('estimateGas')>=0) msg='Contract has no liquidity. Contact admin to seed the SpotDEX/PerpDEX contracts.';
      else if(raw.indexOf('BaseScan')>=0||raw.indexOf('basescan.org')>=0) msg=raw;

      setToast({msg:msg,type:'err'});

    setL(false);setStep('');

function App(){
  var addr=useState(null),setAddr=addr[1];addr=addr[0];
  var isGuest=addr==='guest';
  var tab=useState('home'),setTab=tab[1];tab=tab[0];
  var screen=useState(null),setScreen=screen[1];screen=screen[0];
  var params=useState({}),setParams=params[1];params=params[0];
  var prices=useState({BTC:71420,ETH:3841,SOL:182,BSLV:0.4821}),setPrices=prices[1];prices=prices[0];
  var pythAge=useState(0),setPythAge=pythAge[1];pythAge=pythAge[0];
  var balances=useState({USDC:0,ETH_TKN:0,SOL_TKN:0,BSLV:0}),setBalances=balances[1];balances=balances[0];
  var positions=useState([]),setPositions=positions[1];positions=positions[0];
  var notifs=useState([]),setNotifs=notifs[1];notifs=notifs[0];
  var pointsInfo=useState(null),setPointsInfo=pointsInfo[1];pointsInfo=pointsInfo[0];
  var sbStats=useState(null),setSbStats=sbStats[1];sbStats=sbStats[0];
  var toast=useState(null),setToastRaw=toast[1];toast=toast[0];
  var chartData=useState({BTC:[],ETH:[],SOL:[],BSLV:[]}),setChartData=chartData[1];chartData=chartData[0];
  var sett=useState({leverage:5,confirmOrders:true,currency:'USD',chartType:'Area',slippage:0.5}),setSett=sett[1];sett=sett[0];
  var lastFetch=useRef(0);
  var setToast=useCallback(function(t){setToastRaw(t);if(t) setTimeout(function(){setToastRaw(null);},4200);},[]);
  var updSett=function(k,v){setSett(function(prev){var n=Object.assign({},prev);n[k]=v;return n;});};

  useEffect(function(){
    if(!addr) return;
    var alive=true;
    var poll=async function(){
      if(!alive) return;
      try{
        await pollPyth();
        setPrices(function(prev){
          var n=Object.assign({},prev);
          ['BTC','ETH','SOL','BSLV'].forEach(function(s){if(pythP[s]){n[s+'_prev']=prev[s]||pythP[s];n[s]=pythP[s];}});
          return n;
        });
        setChartData(function(prev){
          var n=Object.assign({},prev);
          ['BTC','ETH','SOL','BSLV'].forEach(function(s){if(pythP[s]) n[s]=(prev[s]||[]).concat([{v:pythP[s]}]).slice(-60);});
          return n;
        });
        lastFetch.current=Date.now();setPythAge(0);
      }catch(er){console.warn('Pyth:',er.message);}
    };
    poll();
    var pt=setInterval(poll,2000),at=setInterval(function(){setPythAge(Math.floor((Date.now()-lastFetch.current)/1000));},1000);
    return function(){alive=false;clearInterval(pt);clearInterval(at);};
  },[addr]);

  useEffect(function(){
    var onTrade=function(){if(addr&&!isGuest){sbMS().then(setSbStats);loadPts&&loadPts().then(setPointsInfo);}};
    window.addEventListener('bl_trade_done',onTrade);
    return function(){window.removeEventListener('bl_trade_done',onTrade);};
  },[addr,isGuest]);

  useEffect(function(){
    if(!addr||isGuest) return;
    var load=async function(){
      try{
        var r=await Promise.all([loadBal(),loadPos(),loadPts(),sbN(),sbMS()]);
        setBalances(r[0]);setPositions(r[1]);setPointsInfo(r[2]);setNotifs(r[3]);setSbStats(r[4]);
      }catch(er){console.warn('load:',er.message);}
    };
    load();
    /* Limit order + SL/TP auto-execute monitor */
    var slTpCheck=setInterval(function(){
      /* Check pending limit orders */
      if(window._limits&&window._limits.length>0){
        window._limits=window._limits.filter(function(ord){
          var markPrice=pythP[ord.sym]||0;
          if(!markPrice) return true; /* keep */
          var triggered=(ord.isLong&&markPrice<=ord.targetPrice)||((!ord.isLong)&&markPrice>=ord.targetPrice);
          if(triggered){
            /* Execute the limit order on-chain */
            (ord.mode==='perp'?perpOpen(ord.sym,ord.isLong,ord.lev,ord.col):
              (ord.isLong?spotBuy(ord.sym,ord.col):spotSell(ord.sym,ord.col))
            ).then(function(res){
              var hash=typeof res==='string'?res:(res&&res.hash)||'';
              setToast({msg:'Limit order executed: '+ord.sym+' @ $'+fP(markPrice),type:'ok',txHash:hash});
              loadPos().then(setPositions);loadBal().then(setBalances);
              window.dispatchEvent(new Event('bl_trade_done'));
            }).catch(function(er){
              setToast({msg:'Limit order failed: '+er.message.slice(0,60),type:'err'});
            });
            return false; /* remove from queue */
          }
          return true; /* keep monitoring */
        });
      }
    },5000);
    /* SL/TP auto-close monitor */
    var slTpCheck2=setInterval(function(){
      if(!window._sltp) return;
      Object.keys(window._sltp).forEach(function(key){
        var order=window._sltp[key];
        var markPrice=pythP[order.sym]||0;
        if(!markPrice) return;
        var triggered=false;
        if(order.sl&&order.isLong&&markPrice<=order.sl) triggered=true;
        if(order.sl&&!order.isLong&&markPrice>=order.sl) triggered=true;
        if(order.tp&&order.isLong&&markPrice>=order.tp) triggered=true;
        if(order.tp&&!order.isLong&&markPrice<=order.tp) triggered=true;
        if(triggered){
          delete window._sltp[key];
          perpClose(order.id).then(function(hash){
            setToast({msg:'SL/TP triggered: '+order.sym+' closed @ $'+fP(markPrice),type:'ok',txHash:hash});
            loadPos().then(setPositions);loadBal().then(setBalances);
          }).catch(function(er){setToast({msg:'SL/TP trigger failed: '+er.message,type:'err'});});
        }
      });
    },5000);
    var t=setInterval(function(){loadBal().then(setBalances);loadPos().then(setPositions);loadPts().then(setPointsInfo);sbMS().then(setSbStats);},15000);
    return function(){try{clearInterval(slTpCheck);clearInterval(slTpCheck2);clearInterval(t);}catch(e){}};  
  },[addr]);

  useEffect(function(){
    if(!addr||isGuest||!account) return;
    var sub=SB.channel('notifs_'+account.toLowerCase())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'address=eq.'+account.toLowerCase()},function(pl){setNotifs(function(prev){return [pl.new].concat(prev);});})
      .subscribe();
    return function(){sub.unsubscribe();};
  },[addr]);

  var nav=function(dest,pp){
    pp=pp||{};
    var tabs=['home','markets','trade','portfolio','more'];
    if(tabs.indexOf(dest)>=0){setTab(dest);setScreen(null);setParams({});}
    else{setScreen(dest);setParams(pp);}
  };
  var back=function(){setScreen(null);setParams({});};
  var unread=notifs.filter(function(n){return !n.is_read;}).length;
  var sp={isGuest:isGuest,setToast:setToast};

  if(!addr) return e(ConnectSc,{onConnect:function(a){setAddr(a);},onGuest:function(){setAddr('guest');}});

  var renderScreen=function(){
    var sym=params.sym||'BTC';
    if(screen==='market') return e(MktDetail,Object.assign({sym:sym,prices:prices,balances:balances,positions:positions,setPositions:setPositions,setBalances:setBalances,setToast:setToast,back:back},sp));
    if(screen==='points') return e(PointsSc,Object.assign({back:back,sbStats:sbStats},sp));
    if(screen==='leaderboard') return e(LeaderSc,{back:back});
    if(screen==='referrals') return e(ReferSc,Object.assign({back:back,pointsInfo:pointsInfo},sp));
    if(screen==='deposit') return e(DepositSc,{back:back,balances:balances});
    if(screen==='withdraw') return e(WithdrawSc,{back:back,balances:balances});
    if(screen==='notifications') return e(NotifSc,{back:back,notifs:notifs,setNotifs:setNotifs});
    if(screen==='profile') return e(ProfileSc,Object.assign({back:back,addr:isGuest?null:addr,pointsInfo:pointsInfo,sbStats:sbStats},sp));
    if(screen==='settings') return e(SettingsSc,{back:back,sett:sett,updSett:updSett});
    return null;
  };

  return e('div',{style:{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:C.bg,position:'relative',overflow:'hidden'}},
    e(TBar,{nav:nav,unread:unread,addr:isGuest?null:addr,age:pythAge}),
    isGuest&&e('div',{style:{position:'fixed',top:52,left:0,right:0,maxWidth:480,margin:'0 auto',zIndex:98,background:'rgba(20,14,0,0.97)',borderBottom:'1px solid '+C.yel+'28',padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('span',{style:{color:C.yel,fontSize:12}},'Guest mode - connect wallet to trade'),
      e('button',{onClick:function(){setAddr(null);},style:{background:C.acc,border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:700,cursor:'pointer'}},'Connect')),
    e(Toast,{msg:toast&&toast.msg,type:toast&&toast.type}),
    e('div',{style:{overflowY:'auto',height:'100vh',WebkitOverflowScrolling:'touch'}},
      screen
        ?e('div',{className:'sup'},renderScreen())
        :e('div',{className:'fin'},
            tab==='home'      &&e(Home,Object.assign({nav:nav,prices:prices,balances:balances,positions:positions,setToast:setToast,setBalances:setBalances},sp)),
            tab==='markets'   &&e(Markets,{prices:prices,nav:nav,chartData:chartData}),
            tab==='trade'     &&e(TradeSc,Object.assign({prices:prices,balances:balances,positions:positions,setPositions:setPositions,setBalances:setBalances,setToast:setToast},sp)),
            tab==='portfolio' &&e(PortfolioSc,{positions:positions,prices:prices,setPositions:setPositions,balances:balances,setBalances:setBalances,setToast:setToast}),
            tab==='more'      &&e(MoreSc,Object.assign({nav:nav,addr:isGuest?null:addr,pointsInfo:pointsInfo,sbStats:sbStats},sp)))),
    e(BNav,{active:screen?null:tab,onChange:function(t){setScreen(null);setTab(t);}}));
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
});
</script>
</body>
</html>
